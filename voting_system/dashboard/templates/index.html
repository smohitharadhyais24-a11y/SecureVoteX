<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ election_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Live Election Dashboard</p>
            <h1>{{ election_name }}</h1>
            <p class="subtitle">A lightweight monitoring view for votes, voters, and security events.</p>
        </section>

        <section class="cards">
            <article class="card accent">
                <span>Total Voters</span>
                <strong id="total-voters">0</strong>
            </article>
            <article class="card">
                <span>Total Votes</span>
                <strong id="total-votes">0</strong>
            </article>
            <article class="card">
                <span>Audit Events</span>
                <strong id="audit-count">0</strong>
            </article>
        </section>

        <section class="panel">
            <h2>Candidate Tally</h2>
            <div id="candidate-list" class="grid"></div>
        </section>

        <section class="panel">
            <h2>Recent Audit Log</h2>
            <div id="audit-list" class="timeline"></div>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
